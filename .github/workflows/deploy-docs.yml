name: Deploy spice docs
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install markdown
      - run: python3 tools/genspices.py --out docs/html/ --emit-json docs/html/doc-names-spices.json
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Assemble dist
        run: |
          rm -rf web/dist
          mkdir -p web/dist
          cp -R docs/html/. web/dist/
          cp -R web/public/. web/dist/
          cp -R web/styles web/dist/styles
      - name: Deploy to Cloudflare
        run: cd web && npm ci && npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
