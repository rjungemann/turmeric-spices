name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Per-spice job: parse build.tur and (if cmake-deps are declared) fetch and
  # build the C dependencies, then attempt to compile every test file via
  # `tur test`.  Tests that fail compilation count as a CI failure; tests
  # that compile but exit non-zero at runtime do too.
  #
  # The matrix is expanded by the `discover-spices` job below so adding or
  # removing a spice does not require touching this file.
  test-spice:
    name: ${{ matrix.spice }} (${{ matrix.os }})
    needs: discover-spices
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        spice: ${{ fromJSON(needs.discover-spices.outputs.spices) }}

    steps:
      - name: Checkout turmeric-spices
        uses: actions/checkout@v4
        with:
          path: turmeric-spices

      - name: Checkout turmeric (compiler)
        uses: actions/checkout@v4
        with:
          repository: rjungemann/turmeric
          path: turmeric

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libedit-dev cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libedit cmake || true

      - name: Build the tur compiler
        working-directory: turmeric
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build -j

      - name: Show spice manifest
        working-directory: turmeric-spices/spices/${{ matrix.spice }}
        run: cat build.tur

      - name: Fetch C dependencies (if any)
        working-directory: turmeric-spices/spices/${{ matrix.spice }}
        env:
          TUR_STDLIB_DIR: ${{ github.workspace }}/turmeric/stdlib
        run: |
          if grep -q ':cmake-deps' build.tur; then
            "$GITHUB_WORKSPACE/turmeric/build/tur" fetch --update || \
              echo "::warning::fetch reported errors (often optional :spices entries); proceeding anyway"
          else
            echo "no :cmake-deps declared"
          fi

      - name: Type-check spice sources
        working-directory: turmeric-spices/spices/${{ matrix.spice }}
        env:
          TUR_STDLIB_DIR: ${{ github.workspace }}/turmeric/stdlib
        run: |
          # SC8: regression matrix.
          # Before the spice-aware-check work, `tur check src/foo/bar.tur`
          # could not resolve intra-spice imports like `(import foo/baz)`
          # because the per-file driver didn't know it was inside a spice;
          # output was a wall of spurious "module not found" lines.  With
          # SC4 auto-discovery + SC5 cross-spice dep wiring landed, each
          # `tur check` is a genuine signal for intra-spice import breakage
          # and missing-export regressions.
          #
          # We must fail the job on any non-zero exit -- the previous
          # `find -exec` pattern swallowed failures because find returns 0
          # regardless of what -exec'd commands return.
          #
          # Per-spice opt-out: a `requires.typecheck-skip` marker file in
          # the spice root marks the spice as known-broken; the type-check
          # step reports it but does not fail the job.  The marker must
          # contain at least one human-readable line explaining what's
          # broken and pointing at a tracking issue.  Delete the marker
          # once the spice type-checks cleanly.
          if [ -f requires.typecheck-skip ]; then
            echo "::warning::type-check skipped via requires.typecheck-skip:"
            sed 's/^/  /' requires.typecheck-skip
            exit 0
          fi
          if [ ! -d src ]; then
            echo "no src/ directory; skipping check"
            exit 0
          fi
          n_files=0
          n_fail=0
          failed=()
          while IFS= read -r -d '' f; do
            n_files=$((n_files + 1))
            if "$GITHUB_WORKSPACE/turmeric/build/tur" check "$f"; then
              echo "  ok   $f"
            else
              echo "::error file=$f::tur check failed"
              n_fail=$((n_fail + 1))
              failed+=("$f")
            fi
          done < <(find src -name '*.tur' -print0)
          echo "Summary: checked $n_files file(s), $n_fail failed"
          if [ "$n_fail" -gt 0 ]; then
            echo "Failed files:"
            for f in "${failed[@]}"; do echo "  - $f"; done
            exit 1
          fi

      - name: Run spice tests (if any)
        working-directory: turmeric-spices/spices/${{ matrix.spice }}
        env:
          TUR_STDLIB_DIR: ${{ github.workspace }}/turmeric/stdlib
        run: |
          # `tur test <dir>` is NOT recursive -- it only picks up *.tur files
          # at the top level of the directory it is given.  Spices store their
          # test suites in one of two layouts:
          #
          #   1. flat:    tests/*.tur                      (ansi, notebook, ...)
          #               (or a flat aggregator that imports nested modules,
          #                e.g. linalg/tests/linalg.tur, template/tests/smoke.tur)
          #   2. nested:  tests/<group>/*_test.tur         (frame, plot, ...)
          #               or tests/<group>/<case>/*.tur    (tourist fixtures)
          #
          # If tests/ has any flat .tur file we run `tur test tests` and stop:
          # that covers the flat spices and the aggregators (descending would
          # double-run the modules the aggregator already imports, and would
          # wrongly try to `tur test` non-suite fixtures like template's).
          # Otherwise we descend and run `tur test` on every directory that
          # directly contains a .tur file.
          if [ ! -d tests ]; then
            echo "no tests/ directory; skipping test run"
            exit 0
          fi
          TUR="$GITHUB_WORKSPACE/turmeric/build/tur"
          if ls tests/*.tur >/dev/null 2>&1; then
            "$TUR" test tests
          else
            n_fail=0
            while IFS= read -r d; do
              echo "== tur test $d =="
              if ! "$TUR" test "$d"; then
                n_fail=$((n_fail + 1))
              fi
            done < <(find tests -name '*.tur' -print0 \
                       | xargs -0 -n1 dirname \
                       | sort -u)
            if [ "$n_fail" -gt 0 ]; then
              echo "$n_fail test directory/directories failed"
              exit 1
            fi
          fi

  # Enumerate the spices/ subdirectories that contain a build.tur so the
  # matrix below stays in sync as spices are added.  Output is a JSON array
  # of basenames (e.g. ["c-dsl","glsl","plutovg",...]).
  discover-spices:
    name: Enumerate spices
    runs-on: ubuntu-latest
    outputs:
      spices: ${{ steps.list.outputs.spices }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          json=$(find spices -mindepth 2 -maxdepth 2 -name build.tur \
                 | sed 's|spices/||;s|/build.tur||' \
                 | sort \
                 | python3 -c 'import json,sys; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')
          echo "spices=$json" >> "$GITHUB_OUTPUT"
          echo "Discovered: $json"

  # Sanity job: every build.tur must parse cleanly.  Catches the
  # `{` vs `#{` regression class without needing the full per-spice matrix.
  manifest-parse:
    name: Parse every build.tur
    runs-on: ubuntu-latest
    steps:
      - name: Checkout turmeric-spices
        uses: actions/checkout@v4
        with:
          path: turmeric-spices

      - name: Checkout turmeric (compiler)
        uses: actions/checkout@v4
        with:
          repository: rjungemann/turmeric
          path: turmeric

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libedit-dev cmake

      - name: Build the tur compiler
        working-directory: turmeric
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build build -j

      - name: Parse every spice manifest
        working-directory: turmeric-spices
        env:
          TUR_STDLIB_DIR: ${{ github.workspace }}/turmeric/stdlib
        run: |
          set -e
          n_ok=0; n_fail=0
          for d in spices/*/; do
            name=$(basename "$d")
            pushd "$d" >/dev/null
            # tur fetch is the cheapest way to exercise the manifest parser.
            # We do not require fetch to succeed (optional :spices entries
            # may fail to clone) -- only that no `:cmake-deps must be a map`
            # or other manifest-parse diagnostic is emitted.
            out=$("$GITHUB_WORKSPACE/turmeric/build/tur" fetch 2>&1 || true)
            if echo "$out" | grep -q 'must be a map\|no (defpackage'; then
              echo "::error::$name manifest parse error"
              echo "$out"
              n_fail=$((n_fail+1))
            else
              echo "OK $name"
              n_ok=$((n_ok+1))
            fi
            popd >/dev/null
          done
          echo "Summary: $n_ok parse-ok, $n_fail parse-fail"
          test "$n_fail" -eq 0
